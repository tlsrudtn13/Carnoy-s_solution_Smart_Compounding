<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카노이 용액 스마트 조제 & 임상 기록 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; background-color: #f3f4f6; }
        .input-pass { background-color: #d1fae5 !important; color: #065f46 !important; border-color: #34d399 !important; }
        .input-fail { background-color: #fee2e2 !important; color: #991b1b !important; border-color: #f87171 !important; }
        .salvage-active { animation: pulseWarning 2s infinite; border-color: #f59e0b; border-width: 2px; }
        @keyframes pulseWarning {
            0% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(245, 158, 11, 0); }
            100% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0); }
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="p-6">

    <div class="max-w-7xl mx-auto space-y-6">
        <div class="bg-white rounded-xl shadow-sm p-6 border-t-4 border-blue-600 flex justify-between items-center flex-wrap gap-4">
            <div>
                <h1 class="text-2xl font-bold text-gray-800">
                    <i class="fas fa-vial text-blue-600 mr-2"></i><span data-i18n="title">카노이 스마트 조제 & 임상 데이터 수집기</span>
                </h1>
                <p class="text-gray-500 mt-2 text-sm" data-i18n="subtitle">영점 조절(Tare) 기반 조제, 동적 스케일링(Salvage Mode) 지원 및 후향적 연구용 데이터 자동 기록</p>
            </div>
            <div class="flex items-center gap-3">
                <select id="langSelect" onchange="changeLanguage()" class="bg-gray-100 border border-gray-300 text-gray-700 text-sm font-bold rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-2.5 outline-none cursor-pointer">
                    <option value="ko">🇰🇷 한국어</option>
                    <option value="en">🇺🇸 English</option>
                </select>
                <button onclick="exportToCSV()" class="bg-green-600 hover:bg-green-700 text-white px-5 py-2.5 rounded-lg text-sm font-bold transition shadow-md flex items-center">
                    <i class="fas fa-file-csv mr-2 text-lg"></i> <span data-i18n="btnExport">연구용 CSV 추출</span>
                </button>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-sm p-6">
            <div id="salvageAlert" class="hidden mb-6 bg-amber-100 border-l-4 border-amber-500 text-amber-800 p-4 rounded shadow-sm salvage-active">
                <div class="flex items-center">
                    <i class="fas fa-exclamation-triangle text-2xl mr-3"></i>
                    <div>
                        <h3 class="font-bold text-lg" data-i18n="salvageAlertTitle">회생 모드 (Salvage Mode) 작동 중!</h3>
                        <p class="text-sm">
                            <span id="salvageText1">목표치 초과 투입이 감지되어 전체 비율을 자동 스케일업했습니다. </span>
                            <strong class="text-red-600" id="salvageText2">폐기하지 마시고</strong><span id="salvageText3">, 아래 카드의 </span>
                            <span class="bg-amber-200 px-1 rounded font-bold text-amber-900" id="salvageText4">영점 조절 후 추가량</span>
                            <span id="salvageText5"> 지시에 따라 부족한 성분을 보충하세요.</span>
                        </p>
                    </div>
                </div>
            </div>

            <div class="bg-gray-50 p-6 rounded-lg mb-6 border border-gray-200">
                <h3 class="text-sm font-bold text-blue-800 mb-3 border-b border-gray-300 pb-2"><i class="fas fa-user-injured mr-1"></i> <span data-i18n="sectionClinical">임상 및 수술 정보</span></h3>
                <div class="grid grid-cols-1 md:grid-cols-5 gap-4 mb-6">
                    <div>
                        <label class="block text-xs font-bold text-gray-600 mb-1" data-i18n="patientId">환자번호 (ID)</label>
                        <input type="text" id="patientId" data-i18n-ph="placeholderId" placeholder="예: 12345678" class="w-full border rounded p-2 text-sm">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-600 mb-1" data-i18n="surgeryDate">수술 날짜</label>
                        <input type="date" id="surgeryDate" class="w-full border rounded p-2 text-sm">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-600 mb-1" data-i18n="surgeryName">수술명 (Operation)</label>
                        <input type="text" id="surgeryName" data-i18n-ph="placeholderOp" placeholder="Enucleation & Chemical Cautery" class="w-full border rounded p-2 text-sm">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-600 mb-1" data-i18n="preDiagnosis">예상 진단명 (Pre-op)</label>
                        <input type="text" id="preDiagnosis" placeholder="OKC" class="w-full border rounded p-2 text-sm">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-600 mb-1" data-i18n="postDiagnosis">최종 진단명 (Post-op)</label>
                        <input type="text" id="postDiagnosis" data-i18n-ph="placeholderPost" placeholder="조직검사 후 입력" class="w-full border rounded p-2 text-sm">
                    </div>
                </div>

                <h3 class="text-sm font-bold text-indigo-800 mb-3 border-b border-gray-300 pb-2"><i class="fas fa-flask mr-1"></i> <span data-i18n="sectionSetup">조제 설정</span></h3>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-5">
                    <div>
                        <label class="block text-xs font-bold text-gray-600 mb-1" data-i18n="compounder">조제자 (Compounder)</label>
                        <input type="text" id="inputName" data-i18n-ph="placeholderName" placeholder="예: 홍길동" class="w-full border rounded p-2 text-sm">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-600 mb-1" data-i18n="compoundDate">조제 일자</label>
                        <input type="date" id="compoundDate" class="w-full border rounded p-2 text-sm">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-600 mb-1" data-i18n="solutionType">용액 종류</label>
                        <select id="inputType" class="w-full border rounded p-2 text-sm font-bold text-gray-700" onchange="resetSystem()">
                            <option value="Modified" id="optModified">Modified Carnoy's (클로로포름 X)</option>
                            <option value="Original" id="optOriginal">Original Carnoy's (클로로포름 O)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-600 mb-1" data-i18n="targetVolume">초기 목표 부피 (mL)</label>
                        <input type="number" id="inputVolume" value="10" min="1" class="w-full border rounded p-2 text-sm font-bold text-blue-600" onchange="resetSystem()">
                    </div>
                </div>

                <div class="grid grid-cols-2 lg:grid-cols-4 gap-4" id="ingredientCards">
                    </div>
                
                <div class="mt-6 flex justify-end gap-3">
                    <button onclick="resetSystem()" class="bg-gray-200 hover:bg-gray-300 text-gray-700 px-4 py-2 rounded text-sm font-bold transition" data-i18n="btnReset">조제 초기화</button>
                    <button onclick="saveRecord()" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-2.5 rounded-lg text-sm font-bold transition shadow-md">
                        <i class="fas fa-save mr-1"></i> <span data-i18n="btnSave">DB에 저장</span>
                    </button>
                </div>
            </div>

            <div class="overflow-x-auto rounded-lg border border-gray-200 shadow-sm no-scrollbar">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-3 py-3 text-left text-xs font-bold text-gray-600" data-i18n="thPatient">환자/수술일</th>
                            <th class="px-3 py-3 text-left text-xs font-bold text-gray-600" data-i18n="thDiag">진단명(Pre/Post)</th>
                            <th class="px-3 py-3 text-center text-xs font-bold text-gray-600" data-i18n="thStatus">상태/조제정보</th>
                            <th class="px-3 py-3 text-left text-xs font-bold text-gray-600" data-i18n="thType">종류(기준)</th>
                            <th class="px-3 py-3 text-center text-xs font-bold text-gray-600" data-i18n="thK">K값</th>
                            <th class="px-3 py-3 text-center text-xs font-bold text-gray-600">EtOH(g)</th>
                            <th class="px-3 py-3 text-center text-xs font-bold text-gray-600">FeCl3(g)</th>
                            <th class="px-3 py-3 text-center text-xs font-bold text-gray-600">CHCl3(g)</th>
                            <th class="px-3 py-3 text-center text-xs font-bold text-gray-600">Acetic(g)</th>
                            <th class="px-3 py-3 text-center text-xs font-bold text-red-500"><i class="fas fa-trash"></i></th>
                        </tr>
                    </thead>
                    <tbody class="bg-white divide-y divide-gray-200 text-sm" id="tableBody">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // --- i18n Dictionary ---
        const i18nData = {
            ko: {
                title: "카노이 스마트 조제 & 임상 데이터 수집기",
                subtitle: "영점 조절(Tare) 기반 조제, 동적 스케일링(Salvage Mode) 지원 및 후향적 연구용 데이터 자동 기록",
                btnExport: "연구용 CSV 추출",
                salvageAlertTitle: "회생 모드 (Salvage Mode) 작동 중!",
                salvageText1: "목표치 초과 투입이 감지되어 전체 비율을 자동 스케일업했습니다. ",
                salvageText2: "폐기하지 마시고",
                salvageText3: ", 아래 카드의 ",
                salvageText4: "영점 조절 후 추가량",
                salvageText5: " 지시에 따라 부족한 성분을 보충하세요.",
                sectionClinical: "임상 및 수술 정보",
                patientId: "환자번호 (ID)",
                surgeryDate: "수술 날짜",
                surgeryName: "수술명 (Operation)",
                preDiagnosis: "예상 진단명 (Pre-op)",
                postDiagnosis: "최종 진단명 (Post-op)",
                sectionSetup: "조제 설정",
                compounder: "조제자 (Compounder)",
                compoundDate: "조제 일자",
                solutionType: "용액 종류",
                targetVolume: "초기 목표 부피 (mL)",
                btnReset: "조제 초기화",
                btnSave: "DB에 저장",
                thPatient: "환자/수술일",
                thDiag: "진단명(Pre/Post)",
                thStatus: "상태/조제정보",
                thType: "종류(기준)",
                thK: "K값",
                optModified: "Modified Carnoy's (클로로포름 X)",
                optOriginal: "Original Carnoy's (클로로포름 O)",
                placeholderId: "예: 12345678",
                placeholderOp: "Enucleation & Chemical Cautery",
                placeholderPost: "조직검사 후 입력",
                placeholderName: "예: 홍길동",
                ingEtOH: "1. 무수 에탄올",
                ingFe: "2. 염화제이철",
                ingChloro: "3. 클로로포름",
                ingAcetic: "4. 아세트산",
                solidBadge: "고체 분말",
                baseTarget: "초기 기준:",
                finalTarget: "목표 투입량:",
                inputActual: "투입량 입력 (g)",
                salvageBox1: "저울을 0으로(Tare) 맞추고 더 넣으세요",
                salvageBox2: "영점 조절 후 추가량:",
                salvageBoxInput: "실제 추가한 양(g)",
                btnApply: "적용",
                currentAccum: "현재 누적 투입량:",
                msgPass: "완벽함",
                msgLack: "부족함",
                alertApply: "추가로 투입한 정확한 양(g)을 입력해주세요.",
                alertSave: "아직 목표량에 도달하지 않은 성분이 있습니다. 추가 투입 지시 박스를 확인하세요.",
                alertSaveSuccess: "기록이 데이터베이스에 안전하게 저장되었습니다.",
                alertDelete: "이 기록을 삭제하시겠습니까?",
                alertExportEmpty: "추출할 데이터가 없습니다.",
                badgeSalvage: "회생조제",
                badgeNormal: "정상조제",
                csvHeader: "연번(No),환자번호,수술날짜,수술명,예상진단,최종진단,조제자,조제일자,용액종류,초기기준부피(mL),조제상태,K값(비율계수),에탄올(g),염화제이철(g),클로로포름(g),아세트산(g)"
            },
            en: {
                title: "Carnoy Smart Compounding & Clinical DB",
                subtitle: "Tare-based compounding, Dynamic Scaling (Salvage Mode), and automatic data logging for research",
                btnExport: "Export Research CSV",
                salvageAlertTitle: "Salvage Mode Activated!",
                salvageText1: "Overpour detected. Overall ratio has been automatically scaled up. ",
                salvageText2: "Do NOT discard.",
                salvageText3: " Follow the ",
                salvageText4: "Add After Tare",
                salvageText5: " instructions below to add missing amounts.",
                sectionClinical: "Clinical & Surgical Info",
                patientId: "Patient ID",
                surgeryDate: "Surgery Date",
                surgeryName: "Operation Name",
                preDiagnosis: "Pre-op Diagnosis",
                postDiagnosis: "Post-op Diagnosis",
                sectionSetup: "Compounding Setup",
                compounder: "Compounder Name",
                compoundDate: "Compound Date",
                solutionType: "Solution Type",
                targetVolume: "Target Volume (mL)",
                btnReset: "Reset Setup",
                btnSave: "Save to DB",
                thPatient: "Patient/Surg.Date",
                thDiag: "Diagnosis(Pre/Post)",
                thStatus: "Status/Compound Info",
                thType: "Type(Base)",
                thK: "K-Factor",
                optModified: "Modified Carnoy's (No Chloroform)",
                optOriginal: "Original Carnoy's (With Chloroform)",
                placeholderId: "e.g., 12345678",
                placeholderOp: "Enucleation & Chemical Cautery",
                placeholderPost: "Enter after biopsy",
                placeholderName: "e.g., John Doe",
                ingEtOH: "1. Absolute Ethanol",
                ingFe: "2. Ferric Chloride",
                ingChloro: "3. Chloroform",
                ingAcetic: "4. Acetic Acid",
                solidBadge: "Solid Powder",
                baseTarget: "Initial Base:",
                finalTarget: "Target Amount:",
                inputActual: "Input Amount (g)",
                salvageBox1: "Tare scale to 0 and add more",
                salvageBox2: "Add After Tare:",
                salvageBoxInput: "Actual added (g)",
                btnApply: "Apply",
                currentAccum: "Current Accumulation:",
                msgPass: "Perfect",
                msgLack: "Lacking",
                alertApply: "Please enter the exact added amount (g).",
                alertSave: "Some ingredients have not reached the target amount. Please check the instructions.",
                alertSaveSuccess: "Record safely saved to database.",
                alertDelete: "Are you sure you want to delete this record?",
                alertExportEmpty: "No data to export.",
                badgeSalvage: "Salvaged",
                badgeNormal: "Normal",
                csvHeader: "No,PatientID,SurgeryDate,Operation,PreDiagnosis,PostDiagnosis,Compounder,CompoundDate,SolutionType,InitialVol(mL),Status,K-Factor,Ethanol(g),FerricChloride(g),Chloroform(g),AceticAcid(g)"
            }
        };

        let currentLang = 'ko';

        function t(key) {
            return i18nData[currentLang][key];
        }

        function changeLanguage() {
            currentLang = document.getElementById('langSelect').value;
            applyTranslations();
        }

        function applyTranslations() {
            // Update static texts
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (t(key)) el.innerText = t(key);
            });

            // Update placeholders
            document.querySelectorAll('[data-i18n-ph]').forEach(el => {
                const key = el.getAttribute('data-i18n-ph');
                if (t(key)) el.placeholder = t(key);
            });

            // Update specific mixed elements safely
            const elTxt1 = document.getElementById('salvageText1'); if (elTxt1) elTxt1.innerText = t('salvageText1');
            const elTxt2 = document.getElementById('salvageText2'); if (elTxt2) elTxt2.innerText = t('salvageText2');
            const elTxt3 = document.getElementById('salvageText3'); if (elTxt3) elTxt3.innerText = t('salvageText3');
            const elTxt4 = document.getElementById('salvageText4'); if (elTxt4) elTxt4.innerText = t('salvageText4');
            const elTxt5 = document.getElementById('salvageText5'); if (elTxt5) elTxt5.innerText = t('salvageText5');

            const optMod = document.getElementById('optModified'); if (optMod) optMod.innerText = t('optModified');
            const optOrig = document.getElementById('optOriginal'); if (optOrig) optOrig.innerText = t('optOriginal');

            // Update ingredient names in logic
            ingredients[0].name = t('ingEtOH');
            ingredients[1].name = t('ingFe');
            ingredients[2].name = t('ingChloro');
            ingredients[3].name = t('ingAcetic');

            // Update solid powder badges
            ingredients.forEach(ing => {
                const badgeEl = document.getElementById(`solidBadge_${ing.id}`);
                if (badgeEl) badgeEl.innerText = t('solidBadge');
            });

            // Update Dynamic UI Text without full reset
            ingredients.forEach(ing => {
                const nameEl = document.getElementById(`ingName_${ing.id}`);
                if (nameEl) nameEl.innerText = ing.name;
                
                const baseTargetEl = document.getElementById(`lbl_base_${ing.id}`);
                if (baseTargetEl) baseTargetEl.innerText = t('baseTarget');
                
                const finalTargetEl = document.getElementById(`lbl_target_${ing.id}`);
                if (finalTargetEl) finalTargetEl.innerText = t('finalTarget');
                
                const actualInput = document.getElementById(`actual_${ing.id}`);
                if (actualInput) actualInput.placeholder = t('inputActual');
                
                const sbox1 = document.getElementById(`lbl_sbox1_${ing.id}`);
                if (sbox1) sbox1.innerHTML = `<i class="fas fa-info-circle"></i> ${t('salvageBox1')}`;
                
                const sbox2 = document.getElementById(`lbl_sbox2_${ing.id}`);
                if (sbox2) sbox2.innerText = t('salvageBox2');
                
                const sboxInput = document.getElementById(`extra_${ing.id}`);
                if (sboxInput) sboxInput.placeholder = t('salvageBoxInput');
                
                const sboxBtn = document.getElementById(`btn_apply_${ing.id}`);
                if (sboxBtn) sboxBtn.innerText = t('btnApply');
                
                const curAccum = document.getElementById(`lbl_accum_${ing.id}`);
                if (curAccum) curAccum.innerText = t('currentAccum');
            });

            processInputs(); // Re-trigger messages to update language safely
            loadTable();     // Update table badges
        }
        // --- End of i18n ---

        // Set today's date
        document.getElementById('surgeryDate').valueAsDate = new Date();
        document.getElementById('compoundDate').valueAsDate = new Date();

        // Formula basis (Voorsmit et al., 1981 — J Maxillofac Surg 9:228-236. PMID: 6172530):
        //   Original Carnoy's:  EtOH 6mL : CHCl3 3mL : AcOH 1mL  + 1g FeCl3(s) per 10mL batch
        //   Modified Carnoy's:  EtOH 6mL : AcOH 1mL              + 1g FeCl3(s) per 10mL batch
        //   (Modified = chloroform-free alternative following FDA restrictions)
        //
        // FeCl3 is a SOLID powder. baseVol here represents grams per standard 10mL batch,
        //   with density=1.000 used as a passthrough (g = baseVol × 1.000 × multiplier).
        //
        // Tolerance: ±3% (tighter than USP <795> ±10% floor).
        //   Rationale: Carnoy's is a chemical cauterant causing ~1.5mm irreversible bone necrosis.
        //   Gravimetric (weight-based) measurement enables ±3% precision on a standard lab balance,
        //   providing tighter batch-to-batch consistency than the USP minimum allows.
        const ingredients = [
            { id: 'EtOH',   name: '1. 무수 에탄올',          baseVol: {Original: 6, Modified: 6}, density: 0.789, color: 'blue',   isSolid: false },
            { id: 'Fe',     name: '2. 염화제이철',            baseVol: {Original: 1, Modified: 1}, density: 1.000, color: 'amber',  isSolid: true  },
            { id: 'Chloro', name: '3. 클로로포름',            baseVol: {Original: 3, Modified: 0}, density: 1.483, color: 'purple', isSolid: false },
            { id: 'Acetic', name: '4. 아세트산',              baseVol: {Original: 1, Modified: 1}, density: 1.049, color: 'green',  isSolid: false }
        ];

        let baseTargets = {};
        let currentTargets = {};
        let isSalvageMode = false;
        let globalK = 1.0;
        let dbRecords = JSON.parse(localStorage.getItem('carnoyDB')) || []; 

        function renderCards() {
            const type = document.getElementById('inputType').value;
            const container = document.getElementById('ingredientCards');
            container.innerHTML = '';

            ingredients.forEach(ing => {
                const isDisabled = (type === 'Modified' && ing.id === 'Chloro');
                const cardHtml = `
                    <div class="bg-white p-4 rounded-xl border ${isDisabled ? 'opacity-40 bg-gray-100' : 'border-gray-200 shadow-sm transition-all duration-300'}" id="card_${ing.id}">
                        <div class="text-sm font-bold text-gray-800 mb-2 flex items-center gap-1.5" id="ingName_${ing.id}">
                            ${ing.name}
                            ${ing.isSolid ? `<span class="whitespace-nowrap text-[9px] font-bold bg-amber-100 text-amber-700 border border-amber-300 px-1.5 py-0.5 rounded-full" id="solidBadge_${ing.id}">${t('solidBadge')}</span>` : ''}
                        </div>
                        
                        <div class="flex justify-between items-end mb-2">
                            <div class="text-[11px] text-gray-500"><span id="lbl_base_${ing.id}">${t('baseTarget')}</span> <span id="base_${ing.id}">0.00</span>g</div>
                            <div class="text-sm font-bold text-${ing.color}-600 transition-all" id="labelTarget_${ing.id}">
                                <span id="lbl_target_${ing.id}">${t('finalTarget')}</span> <span id="target_${ing.id}" class="text-lg">0.00</span>g
                            </div>
                        </div>
                        
                        <div class="relative">
                            <input type="number" step="0.001" min="0" id="actual_${ing.id}" placeholder="${t('inputActual')}"
                                class="w-full border-2 border-gray-300 rounded-lg p-3 text-sm font-bold transition focus:outline-none focus:border-${ing.color}-500"
                                oninput="processInputs()" ${isDisabled ? 'disabled' : ''}>
                        </div>
                        
                        <div id="salvageBox_${ing.id}" class="hidden mt-3 bg-amber-50 border border-amber-300 rounded-lg p-3 shadow-inner">
                            <div class="text-xs text-amber-900 font-bold mb-2" id="lbl_sbox1_${ing.id}">
                                <i class="fas fa-info-circle"></i> ${t('salvageBox1')}
                            </div>
                            <div class="flex justify-between items-center bg-amber-200 rounded p-2 mb-2">
                                <span class="text-amber-900 text-[11px] font-bold" id="lbl_sbox2_${ing.id}">${t('salvageBox2')}</span>
                                <span class="text-red-600 font-bold text-base" id="addMore_${ing.id}">+0.00g</span>
                            </div>
                            <div class="flex gap-2 items-center">
                                <input type="number" step="0.001" min="0" id="extra_${ing.id}" placeholder="${t('salvageBoxInput')}" class="w-full border border-amber-400 rounded p-1 text-sm font-bold text-amber-900 bg-white">
                                <button onclick="applyExtra('${ing.id}')" id="btn_apply_${ing.id}" class="bg-amber-600 hover:bg-amber-700 text-white px-3 py-1.5 rounded text-xs font-bold whitespace-nowrap transition shadow">${t('btnApply')}</button>
                            </div>
                            <div class="text-[10px] text-gray-500 mt-2 text-right"><span id="lbl_accum_${ing.id}">${t('currentAccum')}</span> <span id="currentIn_${ing.id}">0.00</span>g</div>
                        </div>
                        
                        <div id="msg_${ing.id}" class="text-xs font-bold mt-2 h-4 text-center"></div>
                    </div>
                `;
                container.innerHTML += cardHtml;
            });
        }

        function applyExtra(id) {
            const extraInput = document.getElementById(`extra_${id}`);
            const mainInput = document.getElementById(`actual_${id}`);
            const extraVal = parseFloat(extraInput.value);
            
            if(!isNaN(extraVal) && extraVal > 0) {
                const currentVal = parseFloat(mainInput.value) || 0;
                // Math.round to 3 decimal places avoids floating-point drift (e.g. 4.72+0.10 = 4.820000000000003)
                mainInput.value = (Math.round((currentVal + extraVal) * 1000) / 1000).toFixed(3);
                extraInput.value = ''; 
                processInputs(); 
            } else {
                alert(t('alertApply'));
            }
        }

        function resetSystem() {
            renderCards();
            const type = document.getElementById('inputType').value;
            const vol = parseFloat(document.getElementById('inputVolume').value) || 10;
            const multiplier = vol / 10.0;
            
            isSalvageMode = false;
            globalK = 1.0;
            
            const alertEl = document.getElementById('salvageAlert');
            if (alertEl) alertEl.classList.add('hidden');

            ingredients.forEach(ing => {
                const baseWeight = (ing.baseVol[type] * ing.density * multiplier).toFixed(3);
                baseTargets[ing.id] = parseFloat(baseWeight);
                currentTargets[ing.id] = parseFloat(baseWeight);
                
                const baseEl = document.getElementById(`base_${ing.id}`);
                const targetEl = document.getElementById(`target_${ing.id}`);
                const actualEl = document.getElementById(`actual_${ing.id}`);
                
                if (baseEl) baseEl.innerText = baseTargets[ing.id].toFixed(2);
                if (targetEl) targetEl.innerText = baseTargets[ing.id].toFixed(2);
                
                if(actualEl && !actualEl.disabled) {
                    actualEl.value = '';
                }
            });
            loadTable();
        }

        function processInputs() {
            let maxRatio = 1.0;

            ingredients.forEach(ing => {
                const inputEl = document.getElementById(`actual_${ing.id}`);
                if (inputEl && !inputEl.disabled && inputEl.value !== '') {
                    const actual = parseFloat(inputEl.value);
                    const base = baseTargets[ing.id];
                    if (base > 0) {
                        const ratio = actual / base;
                        if (ratio > 1.03 && ratio > maxRatio) {
                            maxRatio = ratio;
                        }
                    }
                }
            });

            const alertEl = document.getElementById('salvageAlert');
            if (maxRatio > 1.03) {
                isSalvageMode = true;
                globalK = maxRatio;
                if (alertEl) alertEl.classList.remove('hidden');
            } else {
                isSalvageMode = false;
                globalK = 1.0;
                if (alertEl) alertEl.classList.add('hidden');
            }

            ingredients.forEach(ing => {
                const inputEl = document.getElementById(`actual_${ing.id}`);
                if(!inputEl || inputEl.disabled) return;

                const msgEl = document.getElementById(`msg_${ing.id}`);
                const cardEl = document.getElementById(`card_${ing.id}`);
                const labelTargetEl = document.getElementById(`labelTarget_${ing.id}`);
                const salvageBox = document.getElementById(`salvageBox_${ing.id}`);
                
                const newTarget = baseTargets[ing.id] * globalK;
                currentTargets[ing.id] = newTarget;
                
                const targetDisplayEl = document.getElementById(`target_${ing.id}`);
                if (targetDisplayEl) targetDisplayEl.innerText = newTarget.toFixed(2);

                const actual = parseFloat(inputEl.value);

                inputEl.className = `w-full border-2 rounded-lg p-3 text-sm font-bold transition focus:outline-none focus:border-${ing.color}-500 bg-white border-gray-300 text-gray-800`;
                if (msgEl) msgEl.innerText = '';
                if (salvageBox) salvageBox.classList.add('hidden');
                if (cardEl) cardEl.classList.remove('border-amber-400', 'bg-amber-50', 'shadow-md');
                if (labelTargetEl) labelTargetEl.classList.remove('text-amber-600', 'animate-pulse');

                // Treat negative values the same as empty input (invalid)
                if (isNaN(actual) || actual < 0) {
                    if (isSalvageMode) {
                        if (cardEl) cardEl.classList.add('border-amber-400', 'bg-amber-50', 'shadow-md');
                        if (salvageBox) salvageBox.classList.remove('hidden');
                        
                        const curInEl = document.getElementById(`currentIn_${ing.id}`);
                        if (curInEl) curInEl.innerText = "0.00";
                        
                        const addMoreEl = document.getElementById(`addMore_${ing.id}`);
                        if (addMoreEl) addMoreEl.innerText = `+${newTarget.toFixed(2)}g`;
                    }
                    return;
                }

                const diff = actual - newTarget;
                const tolerance = newTarget * 0.03;

                if (Math.abs(diff) <= tolerance) {
                    inputEl.classList.replace('border-gray-300', 'border-green-500');
                    inputEl.classList.replace('bg-white', 'bg-green-50');
                    inputEl.classList.add('text-green-700');
                    if (msgEl) msgEl.innerHTML = `<i class="fas fa-check-circle text-green-600"></i> ${t('msgPass')}`;
                } else if (actual < newTarget - tolerance) {
                    inputEl.classList.replace('border-gray-300', 'border-red-400');
                    inputEl.classList.replace('bg-white', 'bg-red-50');
                    const needed = newTarget - actual;
                    
                    if (isSalvageMode) {
                        if (cardEl) cardEl.classList.add('border-amber-400', 'bg-amber-50', 'shadow-md');
                        if (salvageBox) salvageBox.classList.remove('hidden');
                        
                        const curInEl = document.getElementById(`currentIn_${ing.id}`);
                        if (curInEl) curInEl.innerText = actual.toFixed(2);
                        
                        const addMoreEl = document.getElementById(`addMore_${ing.id}`);
                        if (addMoreEl) addMoreEl.innerText = `+${needed.toFixed(2)}g`;
                    } else {
                        if (msgEl) msgEl.innerHTML = `<span class="text-red-600"><i class="fas fa-plus"></i> ${needed.toFixed(2)}g ${t('msgLack')}</span>`;
                    }
                } else if (actual > newTarget + tolerance && !isSalvageMode) {
                     inputEl.classList.replace('border-gray-300', 'border-amber-500');
                     inputEl.classList.replace('bg-white', 'bg-amber-100');
                }
            });
        }

        function saveRecord() {
            let isValid = true;
            let actualData = {};
            
            ingredients.forEach(ing => {
                const el = document.getElementById(`actual_${ing.id}`);
                if (el && !el.disabled) {
                    const actual = parseFloat(el.value);
                    // Guard NaN and negative before storing — prevents "NaN" strings in CSV exports
                    if (isNaN(actual) || actual < 0) { isValid = false; return; }
                    if (actual < currentTargets[ing.id] * 0.97) isValid = false;
                    actualData[ing.id] = actual;
                } else {
                    actualData[ing.id] = null;
                }
            });

            if(!isValid) {
                alert(t('alertSave'));
                return;
            }

            const record = {
                id: Date.now(),
                patientId: document.getElementById('patientId').value || 'N/A',
                surgeryDate: document.getElementById('surgeryDate').value,
                surgeryName: document.getElementById('surgeryName').value || 'N/A',
                preDiagnosis: document.getElementById('preDiagnosis').value || 'N/A',
                postDiagnosis: document.getElementById('postDiagnosis').value || 'Pending',
                compounder: document.getElementById('inputName').value || 'Unknown',
                compoundDate: document.getElementById('compoundDate').value,
                type: document.getElementById('inputType').value,
                baseVolume: document.getElementById('inputVolume').value,
                isSalvaged: isSalvageMode,
                kFactor: globalK.toFixed(3),
                actuals: actualData,
                targets: {...currentTargets}
            };

            dbRecords.push(record);
            localStorage.setItem('carnoyDB', JSON.stringify(dbRecords)); 
            
            resetSystem();
            alert(t('alertSaveSuccess'));
        }

        function deleteRecord(id) {
            if(confirm(t('alertDelete'))) {
                dbRecords = dbRecords.filter(r => r.id !== id);
                localStorage.setItem('carnoyDB', JSON.stringify(dbRecords));
                loadTable();
            }
        }

        function loadTable() {
            const tbody = document.getElementById('tableBody');
            if (!tbody) return;
            tbody.innerHTML = '';

            const sortedRecords = [...dbRecords].reverse();

            sortedRecords.forEach(r => {
                const statusBadge = r.isSalvaged 
                    ? `<span class="bg-amber-100 text-amber-800 border border-amber-300 px-2 py-1 rounded text-[10px] font-bold">${t('badgeSalvage')}</span>`
                    : `<span class="bg-green-100 text-green-800 border border-green-300 px-2 py-1 rounded text-[10px] font-bold">${t('badgeNormal')}</span>`;

                const getVal = (id) => r.actuals[id] !== null ? parseFloat(r.actuals[id]).toFixed(2) : '-';

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="px-3 py-3">
                        <div class="text-sm font-bold text-gray-800">${r.patientId}</div>
                        <div class="text-[10px] text-gray-500">${r.surgeryDate}</div>
                    </td>
                    <td class="px-3 py-3">
                        <div class="text-xs text-gray-600">Pre: ${r.preDiagnosis}</div>
                        <div class="text-xs text-blue-600 font-semibold">Post: ${r.postDiagnosis}</div>
                    </td>
                    <td class="px-3 py-3 text-center">
                        ${statusBadge}
                        <div class="text-[10px] text-gray-500 mt-1">${r.compoundDate}</div>
                        <div class="text-[10px] text-indigo-600 font-bold">${r.compounder}</div>
                    </td>
                    <td class="px-3 py-3 text-xs font-bold text-gray-700">${r.type}<br><span class="text-gray-400 font-normal">${r.baseVolume}mL</span></td>
                    <td class="px-3 py-3 text-center text-xs text-gray-500 font-mono">x${r.kFactor}</td>
                    <td class="px-3 py-3 text-center font-bold text-gray-800">${getVal('EtOH')}</td>
                    <td class="px-3 py-3 text-center font-bold text-gray-800">${getVal('Fe')}</td>
                    <td class="px-3 py-3 text-center font-bold text-gray-800">${getVal('Chloro')}</td>
                    <td class="px-3 py-3 text-center font-bold text-gray-800">${getVal('Acetic')}</td>
                    <td class="px-3 py-3 text-center">
                        <button onclick="deleteRecord(${r.id})" class="text-red-400 hover:text-red-600"><i class="fas fa-trash-alt"></i></button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function exportToCSV() {
            if(dbRecords.length === 0) {
                alert(t('alertExportEmpty')); return;
            }

            var csv = ['\uFEFF' + t('csvHeader')];
            
            dbRecords.forEach((r, index) => {
                const getVal = (id) => r.actuals[id] !== null ? r.actuals[id] : '0';
                const status = r.isSalvaged ? (currentLang === 'en' ? 'Salvaged' : '회생조제') : (currentLang === 'en' ? 'Normal' : '정상조제');
                const safe = (text) => `"${String(text).replace(/"/g, '""')}"`;

                const row = [
                    index + 1, 
                    safe(r.patientId), safe(r.surgeryDate), safe(r.surgeryName), safe(r.preDiagnosis), safe(r.postDiagnosis),
                    safe(r.compounder), safe(r.compoundDate), r.type, r.baseVolume, status, r.kFactor,
                    getVal('EtOH'), getVal('Fe'), getVal('Chloro'), getVal('Acetic')
                ];
                csv.push(row.join(","));
            });

            var blob = new Blob([csv.join("\n")], {type: "text/csv;charset=utf-8;"});
            var link = document.createElement("a");
            link.href = window.URL.createObjectURL(blob);
            link.download = `Carnoy_Clinical_Data_${new Date().toISOString().split('T')[0]}.csv`; 
            link.click();
            URL.revokeObjectURL(link.href);
        }

        // 초기화 실행 (순서 변경 및 안전 로직 강화)
        resetSystem();       // 1. 렌더링 및 테이블 생성 (DOM 준비 완료)
        applyTranslations(); // 2. 언어 사전 세팅 및 UI 텍스트 반영
    </script>
</body>
</html>
